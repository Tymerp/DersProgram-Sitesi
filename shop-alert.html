<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Alert Overlay</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background: transparent; overflow: hidden; margin: 0; padding: 0; font-family: var(--font-main); }
  .alert-box {
    width: 580px; height: 160px;
    background: #c0c0c0;
    border: 3px solid; border-color: #fff #888 #888 #fff;
    position: absolute; top: 10px; left: 10px;
    display: flex; flex-direction: column;
    transform: translateY(-200px); /* hidden initially */
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 5px 5px 0px rgba(0,0,0,0.5);
  }
  .alert-box.show { transform: translateY(0); }
  .titlebar {
    background: #000080; color: #fff; padding: 4px 8px; font-weight: bold; font-size: 14px;
    display: flex; justify-content: space-between;
  }
  .content { padding: 16px; display: flex; align-items: center; gap: 16px; flex: 1; }
  .icon { font-size: 64px; animation: bounce 0.5s infinite alternate; }
  .text-area { flex: 1; }
  .buyer-name { color: #000080; font-family: var(--font-display); font-size: 28px; text-shadow: 1px 1px 0 #fff; }
  .item-name { font-size: 20px; margin-top: 8px; font-weight: bold; color: #aa0000; }
  .pts-cost { font-size: 16px; color: #555; margin-top: 4px; }
  
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
</style>
</head>
<body>

<div class="alert-box" id="alertBox">
  <div class="titlebar">
    <span>Market Alışverişi!</span>
    <span>_ □ ✕</span>
  </div>
  <div class="content">
    <div class="icon">🛒</div>
    <div class="text-area">
      <div class="buyer-name" id="buyerName">Kullanıcı</div>
      <div class="item-name" id="itemName">Bir eşya satın aldı!</div>
      <div class="pts-cost" id="itemCost">-50 Puan</div>
    </div>
  </div>
</div>

<!-- Ses efekti için -->
<audio id="alertSound" src="https://www.myinstants.com/media/sounds/coin.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYkgd-zKX-AzE5bXKnUWuwSMIT__4Z7OA",
  authDomain: "dersprogram-31d2d.firebaseapp.com",
  projectId: "dersprogram-31d2d",
  storageBucket: "dersprogram-31d2d.firebasestorage.app",
  messagingSenderId: "910271309823",
  appId: "1:910271309823:web:87684f55e386e0ef5e29ca"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const streamer = params.get('user');
const duration = parseInt(params.get('duration')) || 5;

let isInitialLoad = true;
const queue = [];
let isPlaying = false;

if (streamer) {
  const q = query(collection(db, 'users', streamer, 'shopPurchases'), orderBy('timestamp', 'desc'), limit(1));
  onSnapshot(q, snap => {
    if (isInitialLoad) { isInitialLoad = false; return; }
    snap.docChanges().forEach(change => {
      if (change.type === 'added') {
        const data = change.doc.data();
        queue.push(data);
        processQueue();
      }
    });
  });
}

function processQueue() {
  if (isPlaying || queue.length === 0) return;
  isPlaying = true;
  const data = queue.shift();
  
  document.getElementById('buyerName').textContent = data.buyer;
  document.getElementById('itemName').textContent = data.itemName;
  document.getElementById('itemCost').textContent = `-${data.cost} Puan`;
  
  const box = document.getElementById('alertBox');
  box.classList.add('show');
  document.getElementById('alertSound').play().catch(e => console.log('Audio error:', e));
  
  setTimeout(() => {
    box.classList.remove('show');
    setTimeout(() => {
      isPlaying = false;
      processQueue();
    }, 600); // Wait for transition
  }, duration * 1000);
}
</script>
</body>
</html>
