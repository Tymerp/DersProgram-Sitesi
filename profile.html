<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background: #008080; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .profile-window { width: 500px; max-height: 90vh; display: flex; flex-direction: column; }
  
  .card-container { background: #d4d0c8; border: 2px solid; border-color: #fff #888 #888 #fff; overflow: hidden; display: flex; flex-direction: column; flex: 1; }
  .banner { width: 100%; height: 120px; background: #888; position: relative; border-bottom: 2px solid #555; }
  .banner img { width: 100%; height: 100%; object-fit: cover; }
  
  .avatar-wrapper { position: absolute; left: 20px; bottom: -40px; width: 80px; height: 80px; border: 4px solid #d4d0c8; background: #c0c0c0; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 32px; font-family: var(--font-display); color: #000080; }
  .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }
  
  .card-header { padding: 50px 20px 20px 20px; }
  .card-name { font-size: 24px; font-family: var(--font-display); color: #000; }
  .card-handle { font-size: 13px; color: #555; font-family: var(--font-main); }
  
  .card-tabs { display: flex; border-bottom: 2px solid #888; background: #c0c0c0; }
  .card-tab { padding: 8px 16px; font-family: var(--font-main); font-size: 13px; cursor: pointer; border-right: 1px solid #888; }
  .card-tab.active { background: #d4d0c8; font-weight: bold; border-top: 2px solid #000080; }
  
  .card-content { flex: 1; padding: 20px; overflow-y: auto; background: #d4d0c8; font-family: var(--font-main); font-size: 13px; }
  
  .info-box { background: #fff; border: 2px solid; border-color: #888 #fff #fff #888; padding: 12px; margin-bottom: 16px; }
  .info-title { font-weight: bold; margin-bottom: 8px; color: #000080; font-size: 11px; text-transform: uppercase; }
  
  .blog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .blog-img { width: 100%; height: 120px; object-fit: cover; border: 2px solid; border-color: #888 #fff #fff #888; }
</style>
</head>
<body>

<div class="window profile-window">
  <div class="window-titlebar">
    <div class="window-title"><div class="window-title-icon"></div><span id="titlebarName">User Profile</span></div>
    <div class="window-controls">
      <div class="win-btn" onclick="window.close()">✕</div>
    </div>
  </div>
  
  <div class="card-container" id="mainContent">
    <div style="text-align:center;padding:40px;color:#888;font-family:var(--font-main)">Loading...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYkgd-zKX-AzE5bXKnUWuwSMIT__4Z7OA",
  authDomain: "dersprogram-31d2d.firebaseapp.com",
  projectId: "dersprogram-31d2d",
  storageBucket: "dersprogram-31d2d.firebasestorage.app",
  messagingSenderId: "910271309823",
  appId: "1:910271309823:web:87684f55e386e0ef5e29ca"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const user = new URLSearchParams(window.location.search).get('user');
const streamerContext = new URLSearchParams(window.location.search).get('streamer');

window.switchTab = (tabId, el) => {
  document.querySelectorAll('.card-tab').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(e => e.style.display = 'none');
  document.getElementById('panel-' + tabId).style.display = 'block';
};

async function loadProfile() {
  if (!user) {
    document.getElementById('mainContent').innerHTML = '<div style="padding:20px">No user specified.</div>';
    return;
  }
  
  try {
    const snap = await getDoc(doc(db, 'users', user));
    if (!snap.exists()) {
      document.getElementById('mainContent').innerHTML = '<div style="padding:20px">User not found.</div>';
      return;
    }
    
    const p = snap.data().profile || {};
    const name = p.name || user;
    const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    
    const bannerHtml = p.bannerImg ? `<img src="${p.bannerImg}">` : '';
    const avatarHtml = p.avatarImg ? `<img src="${p.avatarImg}">` : initials;
    
    document.getElementById('titlebarName').textContent = name + ' - Profile';
    
    let html = `
      <div class="banner">
        ${bannerHtml}
        <div class="avatar-wrapper">${avatarHtml}</div>
      </div>
      <div class="card-header">
        <div class="card-name">${name}</div>
        <div class="card-handle">@${user} ${p.title ? ' • ' + p.title : ''}</div>
      </div>
      <div class="card-tabs">
        <div class="card-tab active" onclick="switchTab('about', this)">Hakkımda</div>
        ${p.days ? `<div class="card-tab" onclick="switchTab('schedule', this)">Program</div>` : ''}
        ${streamerContext ? `<div class="card-tab" onclick="switchTab('blog', this)">Blog</div>` : ''}
      </div>
      <div class="card-content">
        <!-- About Panel -->
        <div id="panel-about" class="tab-panel">
          <div class="info-box">
            <div class="info-title">Hakkımda</div>
            <div>${p.about ? p.about.replace(/</g,'&lt;').replace(/>/g,'&gt;') : '<span style="color:#888">Belirtilmemiş.</span>'}</div>
          </div>
          ${(p.socialYT || p.socialIG || p.socialTW || p.donateUrl) ? `
          <div class="info-box">
            <div class="info-title">Bağlantılar</div>
            <div style="display:flex;gap:12px;flex-wrap:wrap">
              ${p.socialYT ? `<a href="${p.socialYT}" target="_blank" style="color:#000080">▶ YouTube</a>` : ''}
              ${p.socialIG ? `<a href="${p.socialIG}" target="_blank" style="color:#000080">📷 Instagram</a>` : ''}
              ${p.socialTW ? `<a href="${p.socialTW}" target="_blank" style="color:#000080">🐦 Twitter</a>` : ''}
              ${p.donateUrl ? `<a href="${p.donateUrl}" target="_blank" style="color:#aa0000;font-weight:bold">💰 ${p.donateText||'Destek Ol'}</a>` : ''}
            </div>
          </div>` : ''}
        </div>
        
        <!-- Schedule Panel -->
        ${p.days ? `
        <div id="panel-schedule" class="tab-panel" style="display:none">
          <div class="info-box">
            <div class="info-title">Yayın Saatleri</div>
            <div>${p.startTime} - ${p.endTime} <span style="color:#555;font-size:11px">(${p.scheduleNote||''})</span></div>
            <div style="margin-top:8px;font-weight:bold">${p.dayNames ? p.dayNames.join(', ') : 'Belirtilmemiş'}</div>
          </div>
          ${p.scheduleImg ? `<img src="${p.scheduleImg}" style="width:100%;border:2px solid #888">` : ''}
        </div>
        ` : ''}
        
        <!-- Blog Panel -->
        ${streamerContext ? `
        <div id="panel-blog" class="tab-panel" style="display:none">
          <div class="info-box" id="blogContent">Yükleniyor...</div>
        </div>
        ` : ''}
      </div>
    `;
    
    document.getElementById('mainContent').innerHTML = html;
    
    // Fetch blog if requested
    if (streamerContext) {
      loadBlogPhotos(streamerContext, user);
    }
    
  } catch(e) {
    document.getElementById('mainContent').innerHTML = '<div style="padding:20px;color:red">Error: ' + e.message + '</div>';
  }
}

async function loadBlogPhotos(streamerId, userId) {
  const container = document.getElementById('blogContent');
  try {
    const msgs = [];
    // Just fetch recent from all topics where sender = user and photo exists
    for (const topic of ['general', 'hours', 'workspace']) {
      const q = query(collection(db, 'users', streamerId, 'forum', topic, 'messages'), where('sender', '==', userId));
      const snaps = await getDocs(q);
      snaps.forEach(d => {
        const data = d.data();
        if (data.photo) msgs.push(data);
      });
    }
    
    msgs.sort((a,b) => b.timestamp - a.timestamp);
    
    if (msgs.length === 0) {
      container.innerHTML = '<span style="color:#888">Henüz fotoğraf paylaşmamış.</span>';
    } else {
      container.innerHTML = '<div class="blog-grid">' + msgs.map(m => `
        <div>
          <img src="${m.photo}" class="blog-img">
          <div style="font-size:10px;color:#555;margin-top:4px">${m.text.substring(0,30)}...</div>
        </div>
      `).join('') + '</div>';
    }
  } catch(e) {
    container.innerHTML = 'Hata: ' + e.message;
  }
}

loadProfile();

</script>
</body>
</html>
