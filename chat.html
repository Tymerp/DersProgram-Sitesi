<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streamer Chat Forum</title>
<link rel="stylesheet" href="style.css">
<style>
.chat-layout{display:grid;grid-template-columns:220px 1fr 280px;gap:12px}
.list-box{border:1px solid var(--win-dark);background:#fff;max-height:520px;overflow:auto}
.room-item,.shop-item,.member-item{padding:8px;border-bottom:1px solid #ddd;cursor:pointer;font-size:12px}
.room-item.active{background:#000080;color:#fff}
.chat-feed{height:420px;overflow:auto;border:1px solid var(--win-dark);padding:8px;background:#fefefe}
.msg{border-bottom:1px solid #e4e4e4;padding:8px 4px}
.msg-top{display:flex;gap:6px;align-items:center}
.msg-name{font-weight:bold;cursor:pointer}
.msg-time{font-size:10px;color:#666}
.msg-role{font-size:10px;padding:0 6px;border:1px solid #999}
.msg-actions button{font-size:10px;padding:1px 6px;min-width:auto}
.msg-text{margin-top:4px;white-space:pre-wrap}
.msg-image{margin-top:6px;max-width:220px;border:1px solid #999}
.reaction-row{display:flex;gap:4px;margin-top:6px}
.reaction-btn{font-size:11px;padding:1px 6px;min-width:auto}
.compose{display:grid;grid-template-columns:1fr 160px auto;gap:6px;margin-top:8px}
.profile-modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center}
.profile-card{width:520px;max-width:95%;background:#fff;border:2px solid #404040}
.banner{height:110px;background:linear-gradient(90deg,#000080,#1084d0);color:#fff;padding:10px}
.blog-box{max-height:130px;overflow:auto;border:1px solid #999;padding:8px;background:#fafafa;font-size:12px}
@media (max-width: 980px){.chat-layout{grid-template-columns:1fr}.window{min-width:0}}
</style>
</head>
<body>
<div class="window" style="max-width:1280px;margin:10px auto">
  <div class="window-titlebar">
    <div class="window-title"><div class="window-title-icon"></div><span id="titleTxt">Chat Forum</span></div>
    <div class="window-controls"><div class="win-btn">_</div><div class="win-btn">□</div><div class="win-btn">✕</div></div>
  </div>
  <div class="addressbar">
    <div class="addr-btn">◀</div><div class="addr-btn">▶</div><div class="addr-btn">⌂</div>
    <div class="addr-label">Address:</div><input class="addr-input" id="addr" readonly><div class="addr-go">▶</div>
  </div>
  <div class="window-content">
    <div class="profile-header" style="margin-bottom:12px">
      <div class="profile-avatar" id="streamerAvatar">??</div>
      <div>
        <div class="profile-name" id="streamerName">...</div>
        <div class="profile-handle" id="whoAmI">Not signed in</div>
      </div>
    </div>

    <div id="msgBox" style="display:none;padding:8px;margin-bottom:10px;font-size:12px;border:1px solid"></div>

    <div id="authWrap" class="groupbox">
      <span class="groupbox-title">Sign In</span>
      <div class="form-row"><label class="form-label">Username</label><input class="retro-input" id="siUser"></div>
      <div class="form-row"><label class="form-label">Password</label><input class="retro-input" id="siPass" type="password"></div>
      <div style="display:flex;gap:8px">
        <button class="retro-btn primary" onclick="doSignIn()">Sign In</button>
        <button class="retro-btn" onclick="goRegister()">Register</button>
        <button class="retro-btn" id="modReqBtn" onclick="requestModerator()" style="display:none">Request Mod</button>
      </div>
    </div>

    <div id="chatWrap" style="display:none">
      <div class="chat-layout">
        <div>
          <div class="groupbox">
            <span class="groupbox-title">Topics</span>
            <div id="rooms" class="list-box"></div>
          </div>
          <div class="groupbox">
            <span class="groupbox-title">Members</span>
            <div id="members" class="list-box"></div>
          </div>
        </div>
        <div>
          <div class="groupbox">
            <span class="groupbox-title" id="roomLabel"># general</span>
            <div id="feed" class="chat-feed"></div>
            <div class="compose">
              <input class="retro-input" id="msgInput" placeholder="Mesaj yaz...">
              <input class="retro-input" id="imgInput" placeholder="Foto URL (opsiyonel)">
              <button class="retro-btn primary" onclick="sendMessage()">Send</button>
            </div>
          </div>
        </div>
        <div>
          <div class="groupbox">
            <span class="groupbox-title">Your Stats</span>
            <div style="font-size:12px">Puan: <strong id="myPoints">0</strong></div>
            <div style="font-size:12px">Rol: <strong id="myRole">👤 Viewer</strong></div>
            <div style="margin-top:8px"><button class="retro-btn" onclick="openProfileEditor()">Edit Profile</button></div>
          </div>
          <div class="groupbox">
            <span class="groupbox-title">Shop</span>
            <div id="shop" class="list-box"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="statusbar"><div class="status-panel" id="statusText">Loading...</div></div>
</div>

<div id="profileModal" class="profile-modal">
  <div class="profile-card">
    <div class="banner" id="cardBanner"></div>
    <div style="padding:10px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:20px;font-family:var(--font-display)" id="cardName">user</div>
        <button class="retro-btn" onclick="closeProfileCard()">Close</button>
      </div>
      <div style="font-size:12px;margin:8px 0" id="cardAbout">...</div>
      <div class="section-title" style="font-size:16px">Blog</div>
      <div id="cardBlog" class="blog-box"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, query, where, orderBy, limit, serverTimestamp, addDoc, increment, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyCYkgd-zKX-AzE5bXKnUWuwSMIT__4Z7OA",authDomain:"dersprogram-31d2d.firebaseapp.com",projectId:"dersprogram-31d2d",storageBucket:"dersprogram-31d2d.firebasestorage.app",messagingSenderId:"910271309823",appId:"1:910271309823:web:87684f55e386e0ef5e29ca"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

const params = new URLSearchParams(window.location.search);
const streamer = params.get("user");
let me = null;
let currentRoom = "general";
let myMember = { points:0 };
let chatRoles = [];
let isStreamer = false;
let isMod = false;
const POINT_COOLDOWN_MS = 30000;

const toEmail = u => u.toLowerCase().replace(/\s+/g, "_")+"@lessonschedule.app";
const setStatus = t => document.getElementById("statusText").textContent = t;
function flash(text, type="info"){
  const b = document.getElementById("msgBox");
  b.style.display = "block";
  b.textContent = text;
  b.style.background = type==="err" ? "#ffe5e5" : "#e8f1ff";
  b.style.borderColor = type==="err" ? "#aa0000" : "#000080";
  setTimeout(()=>b.style.display="none", 3000);
}

async function ensureDefaults(){
  const roomRef = collection(db,"users",streamer,"chatRooms");
  const roomSnap = await getDocs(roomRef);
  if (roomSnap.empty){
    const defaults = [
      { id:"general", name:"Genel Chat", slug:"general", order:1, enabled:true },
      { id:"study-hours", name:"Kac Saat Calistim", slug:"study-hours", order:2, enabled:true },
      { id:"study-space", name:"Calisma Alanim", slug:"study-space", order:3, enabled:true }
    ];
    for (const r of defaults){
      await setDoc(doc(db,"users",streamer,"chatRooms",r.id), r);
    }
  }
  const roleRef = collection(db,"users",streamer,"chatRoles");
  const roleSnap = await getDocs(roleRef);
  if (roleSnap.empty){
    const defaults = [
      { id:"viewer", name:"Viewer", color:"#444444", emoji:"👤", minPoints:0, order:1 },
      { id:"active", name:"Active", color:"#000080", emoji:"⚡", minPoints:20, order:2 },
      { id:"legend", name:"Legend", color:"#8b0000", emoji:"👑", minPoints:80, order:3 }
    ];
    for (const r of defaults) await setDoc(doc(db,"users",streamer,"chatRoles",r.id), r);
  }
  const shopRef = collection(db,"users",streamer,"shopItems");
  const shopSnap = await getDocs(shopRef);
  if (shopSnap.empty){
    await setDoc(doc(db,"users",streamer,"shopItems","streak_restore"), {
      title:"Streak Restore (Tek Sefer)",
      cost:25,
      type:"streak_restore",
      payload:{ actionText:"Streakini geri yukle!" },
      enabled:true,
      createdBy:"system"
    });
  }
}

async function loadStreamer(){
  const s = await getDoc(doc(db,"users",streamer));
  if (!s.exists()) {
    document.body.innerHTML = "Streamer bulunamadi.";
    return;
  }
  const p = s.data().profile || {};
  const name = p.name || streamer;
  document.getElementById("streamerName").textContent = name;
  document.getElementById("streamerAvatar").textContent = name.slice(0,2).toUpperCase();
  document.getElementById("titleTxt").textContent = `${name} Chat Forum`;
  document.title = `${name} Chat Forum`;
  document.getElementById("addr").value = `lessonschedule.app/chat.html?user=${streamer}`;
}

function calcRole(points){
  if (!chatRoles.length) return { name:"Viewer", emoji:"👤", color:"#444" };
  const sorted = [...chatRoles].sort((a,b)=>(b.minPoints||0)-(a.minPoints||0));
  return sorted.find(r=>points>= (r.minPoints||0)) || sorted[sorted.length-1];
}

function renderRoomList(rooms){
  const el = document.getElementById("rooms");
  el.innerHTML = rooms.map(r=>`<div class="room-item ${currentRoom===r.id?'active':''}" onclick="pickRoom('${r.id}','${(r.name||'').replace(/'/g,"")}')"># ${r.name}</div>`).join("");
}
window.pickRoom = (id, label) => {
  currentRoom = id;
  document.getElementById("roomLabel").textContent = `# ${label || id}`;
  bindMessages();
  bindRooms();
};

function renderShop(items){
  const el = document.getElementById("shop");
  if (!items.length){ el.innerHTML = `<div class="shop-item">Shop bos</div>`; return; }
  el.innerHTML = items.map(i=>`<div class="shop-item">
    <div><strong>${i.title}</strong></div>
    <div style="font-size:11px;color:#555">${i.cost} puan</div>
    <div style="margin-top:4px"><button class="retro-btn" style="font-size:11px;padding:1px 8px" onclick="buyItem('${i.id}')">Satin Al</button></div>
  </div>`).join("");
}

function renderMembers(list){
  const el = document.getElementById("members");
  el.innerHTML = list.slice(0,50).map(m=>`<div class="member-item" onclick="openUserCard('${m.id}')">${m.id} · ${m.points||0}p</div>`).join("");
}

let stopMsgs = null;
function bindMessages(){
  if (stopMsgs) stopMsgs();
  const qy = query(collection(db,"users",streamer,"chatMessages"), where("roomId","==",currentRoom), orderBy("createdAt","desc"), limit(60));
  stopMsgs = onSnapshot(qy, snap=>{
    const rows = [];
    snap.forEach(d=>rows.push({id:d.id, ...d.data()}));
    rows.reverse();
    const feed = document.getElementById("feed");
    feed.innerHTML = rows.map(m=>{
      const deleted = m.deleted===true;
      const role = m.roleLabel || "👤 Viewer";
      const canModerate = (isStreamer || isMod) && !deleted;
      return `<div class="msg">
        <div class="msg-top">
          <span class="msg-name" onclick="openUserCard('${m.author}')">${m.author}</span>
          <span class="msg-role">${role}</span>
          <span class="msg-time">${m.createdAt?.toDate ? m.createdAt.toDate().toLocaleTimeString() : ""}</span>
          ${canModerate ? `<span class="msg-actions">
            <button class="retro-btn" onclick="deleteMessage('${m.id}')">Sil</button>
            <button class="retro-btn" onclick="muteUser('${m.author}')">Sustur</button>
            <button class="retro-btn" onclick="banUser('${m.author}')">Ban</button>
          </span>` : ""}
        </div>
        <div class="msg-text">${deleted ? "<i>Mesaj silindi</i>" : (m.text || "")}</div>
        ${!deleted && m.imageUrl ? `<img class="msg-image" src="${m.imageUrl}" alt="">` : ""}
        ${!deleted ? `<div class="reaction-row">
          <button class="retro-btn reaction-btn" onclick="reactMsg('${m.id}','like')">👍 ${m.reactionCounts?.like||0}</button>
          <button class="retro-btn reaction-btn" onclick="reactMsg('${m.id}','love')">❤️ ${m.reactionCounts?.love||0}</button>
          <button class="retro-btn reaction-btn" onclick="reactMsg('${m.id}','fire')">🔥 ${m.reactionCounts?.fire||0}</button>
        </div>` : ""}
      </div>`;
    }).join("");
    feed.scrollTop = feed.scrollHeight;
  });
}

function bindRooms(){
  onSnapshot(query(collection(db,"users",streamer,"chatRooms"), orderBy("order","asc")), snap=>{
    const rooms = [];
    snap.forEach(d=>{ if ((d.data().enabled ?? true) === true) rooms.push({id:d.id, ...d.data()});});
    renderRoomList(rooms);
  });
}

function bindRoles(){
  onSnapshot(query(collection(db,"users",streamer,"chatRoles"), orderBy("order","asc")), snap=>{
    const arr=[]; snap.forEach(d=>arr.push({id:d.id, ...d.data()})); chatRoles = arr;
    const role = calcRole(myMember.points||0);
    document.getElementById("myRole").textContent = `${role.emoji||"👤"} ${role.name||"Viewer"}`;
  });
}

function bindMembers(){
  onSnapshot(query(collection(db,"users",streamer,"chatMembers"), orderBy("points","desc"), limit(100)), snap=>{
    const list=[]; snap.forEach(d=>list.push({id:d.id, ...d.data()}));
    renderMembers(list);
  });
}

function bindShop(){
  onSnapshot(query(collection(db,"users",streamer,"shopItems"), where("enabled","==",true)), snap=>{
    const arr=[]; snap.forEach(d=>arr.push({id:d.id, ...d.data()})); renderShop(arr);
  });
}

async function loadMyMember(username){
  const ref = doc(db,"users",streamer,"chatMembers",username);
  const s = await getDoc(ref);
  if (!s.exists()){
    await setDoc(ref,{
      points:0,lastPointAt:0,chatRoleId:"viewer",banned:false,mutedUntil:0,
      profileExtras:{bannerText:`${username} retro profile`,avatarEmoji:"🧑",about:"",blogPosts:[]}
    },{merge:true});
    myMember = { points:0,lastPointAt:0,banned:false,mutedUntil:0 };
  } else {
    myMember = s.data();
  }
  document.getElementById("myPoints").textContent = myMember.points || 0;
  const meRole = calcRole(myMember.points || 0);
  document.getElementById("myRole").textContent = `${meRole.emoji||"👤"} ${meRole.name||"Viewer"}`;
  if (myMember.banned) flash("Bu chatten banlandin.", "err");
}

async function checkPermissions(){
  isStreamer = me === streamer;
  isMod = false;
  if (!isStreamer){
    const mod = await getDoc(doc(db,"users",streamer,"moderators",me));
    isMod = mod.exists() && mod.data().approvedByStreamer === true;
  }
  document.getElementById("modReqBtn").style.display = isStreamer ? "none" : "inline-block";
}

window.doSignIn = async () => {
  const user = document.getElementById("siUser").value.trim().toLowerCase();
  const pass = document.getElementById("siPass").value;
  if (!user || !pass){ flash("Kullanici ve sifre gerekli", "err"); return; }
  try {
    await signInWithEmailAndPassword(auth, toEmail(user), pass);
    localStorage.setItem("dp_current", user);
  } catch(e){ flash("Giris basarisiz: "+e.message, "err"); }
};
window.goRegister = () => window.location.href = `attendance.html?user=${streamer}`;

window.sendMessage = async () => {
  if (!me) return;
  const text = document.getElementById("msgInput").value.trim();
  const imageUrl = document.getElementById("imgInput").value.trim();
  if (!text && !imageUrl) return;
  const memRef = doc(db,"users",streamer,"chatMembers",me);
  const memSnap = await getDoc(memRef);
  const mem = memSnap.exists() ? memSnap.data() : {};
  if (mem.banned) { flash("Banli oldugun icin mesaj atamazsin", "err"); return; }
  if ((mem.mutedUntil||0) > Date.now()) { flash("Susturuldun, daha sonra tekrar dene", "err"); return; }
  const role = calcRole(mem.points||0);
  await addDoc(collection(db,"users",streamer,"chatMessages"),{
    roomId: currentRoom,
    author: me,
    text,
    imageUrl,
    roleLabel: `${role.emoji||"👤"} ${role.name||"Viewer"}`,
    createdAt: serverTimestamp(),
    deleted:false,
    reactionCounts:{like:0,love:0,fire:0}
  });
  const now = Date.now();
  const last = mem.lastPointAt || 0;
  if (now - last >= POINT_COOLDOWN_MS){
    await updateDoc(memRef,{ points: increment(1), lastPointAt: now });
    const newPoints = (mem.points||0)+1;
    document.getElementById("myPoints").textContent = newPoints;
    const newRole = calcRole(newPoints);
    document.getElementById("myRole").textContent = `${newRole.emoji||"👤"} ${newRole.name||"Viewer"}`;
  }
  document.getElementById("msgInput").value = "";
  document.getElementById("imgInput").value = "";
};

window.reactMsg = async (id,key) => {
  try { await updateDoc(doc(db,"users",streamer,"chatMessages",id), { [`reactionCounts.${key}`]: increment(1) }); } catch(e){}
};

window.deleteMessage = async (id) => {
  if (!(isStreamer || isMod)) return;
  await updateDoc(doc(db,"users",streamer,"chatMessages",id), { deleted:true, text:"", imageUrl:"", deletedBy:me, editedAt:serverTimestamp() });
  await addDoc(collection(db,"users",streamer,"moderationLogs"),{ action:"delete_message", target:id, actor:me, createdAt:serverTimestamp() });
};
window.muteUser = async (user) => {
  if (!(isStreamer || isMod)) return;
  const mins = parseInt(prompt("Kac dakika susturulsun?", "10")||"10", 10);
  await setDoc(doc(db,"users",streamer,"chatMembers",user), { mutedUntil: Date.now()+Math.max(1,mins)*60000 }, { merge:true });
  await addDoc(collection(db,"users",streamer,"moderationLogs"),{ action:"mute", target:user, actor:me, reason:`${mins}m`, expiresAt: Date.now()+Math.max(1,mins)*60000, createdAt:serverTimestamp() });
};
window.banUser = async (user) => {
  if (!(isStreamer || isMod)) return;
  if (!confirm(`${user} banlansin mi?`)) return;
  await setDoc(doc(db,"users",streamer,"chatMembers",user), { banned:true }, { merge:true });
  await addDoc(collection(db,"users",streamer,"moderationLogs"),{ action:"ban", target:user, actor:me, createdAt:serverTimestamp() });
};

window.requestModerator = async () => {
  if (!me || isStreamer) return;
  await setDoc(doc(db,"users",streamer,"modRequests",me), { requester:me, status:"pending", createdAt:serverTimestamp() }, { merge:true });
  flash("Mod istegi gonderildi.");
};

window.buyItem = async (itemId) => {
  if (!me) return;
  const itemRef = doc(db,"users",streamer,"shopItems",itemId);
  const itemSnap = await getDoc(itemRef);
  if (!itemSnap.exists()) return;
  const item = itemSnap.data();
  const memRef = doc(db,"users",streamer,"chatMembers",me);
  const memSnap = await getDoc(memRef);
  const mem = memSnap.data() || {};
  const points = mem.points || 0;
  if (points < (item.cost||0)){ flash("Yetersiz puan", "err"); return; }

  if (item.type === "streak_restore"){
    const attRef = doc(db,"users",streamer,"attendance",me);
    const attSnap = await getDoc(attRef);
    const att = attSnap.exists() ? attSnap.data() : {};
    if (!att.reviveAvailable || !att.pendingReviveStreak){
      flash("Streak restore su an kullanilamaz.", "err");
      return;
    }
    await updateDoc(attRef, {
      streak: att.pendingReviveStreak,
      reviveAvailable: false,
      reviveUsedAt: Date.now(),
      revivedFromShop: true
    });
  }

  await updateDoc(memRef, { points: increment(-(item.cost||0)) });
  const purchase = await addDoc(collection(db,"users",streamer,"shopPurchases"),{
    buyer:me,itemId,cost:item.cost||0,status:"completed",createdAt:serverTimestamp()
  });
  await setDoc(doc(db,"users",streamer,"notifications",Date.now().toString()),{
    type:"shop_purchase",
    buyer:me,
    itemTitle:item.title||itemId,
    instruction:item.payload?.actionText || `${item.title} islemini uygula`,
    purchaseId:purchase.id,
    timestamp:serverTimestamp()
  });
  flash("Satin alim tamamlandi!");
};

window.openUserCard = async (username) => {
  const member = await getDoc(doc(db,"users",streamer,"chatMembers",username));
  const extras = member.exists() ? (member.data().profileExtras || {}) : {};
  document.getElementById("cardBanner").textContent = extras.bannerText || `${username} profile`;
  document.getElementById("cardName").textContent = `${extras.avatarEmoji||"🧑"} ${username}`;
  document.getElementById("cardAbout").textContent = extras.about || "Hakkimda bilgisi yok.";
  const posts = Array.isArray(extras.blogPosts) ? extras.blogPosts : [];
  document.getElementById("cardBlog").innerHTML = posts.length ? posts.map(p=>`<div style="margin-bottom:8px">• ${p}</div>`).join("") : "Blog paylasimi yok.";
  document.getElementById("profileModal").style.display = "flex";
};
window.closeProfileCard = () => document.getElementById("profileModal").style.display = "none";
window.openProfileEditor = async () => {
  if (!me) return;
  const cur = await getDoc(doc(db,"users",streamer,"chatMembers",me));
  const ex = cur.exists() ? (cur.data().profileExtras||{}) : {};
  const bannerText = prompt("Banner yazi", ex.bannerText || `${me} retro profile`);
  if (bannerText===null) return;
  const avatarEmoji = prompt("Avatar emoji", ex.avatarEmoji || "🧑");
  if (avatarEmoji===null) return;
  const about = prompt("Hakkimda", ex.about || "");
  if (about===null) return;
  const postsRaw = prompt("Blog (satirlar virgul ile)", (ex.blogPosts||[]).join(", "));
  if (postsRaw===null) return;
  const blogPosts = postsRaw.split(",").map(s=>s.trim()).filter(Boolean).slice(0,10);
  await setDoc(doc(db,"users",streamer,"chatMembers",me),{ profileExtras:{ bannerText, avatarEmoji, about, blogPosts } },{ merge:true });
  flash("Profilin guncellendi.");
};

onAuthStateChanged(auth, async user=>{
  if (!streamer){
    document.body.innerHTML = "URL'e ?user=streamer eklemelisin.";
    return;
  }
  await loadStreamer();
  await ensureDefaults();
  bindRooms();
  bindShop();
  bindMembers();
  bindRoles();
  if (!user){
    document.getElementById("authWrap").style.display = "block";
    document.getElementById("chatWrap").style.display = "none";
    setStatus("Giris bekleniyor");
    return;
  }
  me = localStorage.getItem("dp_current") || user.email.replace("@lessonschedule.app","");
  await loadMyMember(me);
  await checkPermissions();
  document.getElementById("whoAmI").textContent = `${me} · ${isStreamer?"Streamer":isMod?"Moderator":"Viewer"}`;
  document.getElementById("authWrap").style.display = "none";
  document.getElementById("chatWrap").style.display = "block";
  bindMessages();
  setStatus("Canli chat baglandi");
});

</script>
