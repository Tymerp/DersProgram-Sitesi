<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum & Chat</title>
<link rel="stylesheet" href="style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  .forum-window { width: 900px; height: 600px; display: flex; flex-direction: column; }
  .forum-container { display: flex; flex: 1; overflow: hidden; background: #c0c0c0; border: 2px solid; border-color: #fff #888 #888 #fff; }
  .sidebar { width: 220px; border-right: 2px solid; border-color: #888; background: #d4d0c8; display: flex; flex-direction: column; padding: 4px; }
  .main-area { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; }
  
  .sidebar-category { font-weight: bold; font-family: var(--font-main); font-size: 11px; padding: 4px 6px; color: #555; margin-top: 8px; border-bottom: 1px solid #aaa; }
  .sidebar-item { padding: 6px 10px; cursor: pointer; font-family: var(--font-main); font-size: 13px; display: flex; align-items: center; gap: 6px; border: 1px solid transparent; }
  .sidebar-item:hover { background: #e0e0e0; border: 1px dotted #888; }
  .sidebar-item.active { background: #000080; color: #fff; border: 1px solid #000080; }
  
  .chat-box { flex: 1; overflow-y: auto; padding: 10px; background: #fff; display: flex; flex-direction: column; gap: 12px; }
  .chat-input-area { padding: 8px; background: #d4d0c8; border-top: 2px solid; border-color: #fff #888 #888 #fff; display: flex; gap: 8px; align-items: center; }
  .chat-input { flex: 1; font-family: var(--font-main); font-size: 13px; padding: 6px; border: 2px solid; border-color: #888 #fff #fff #888; }
  .chat-btn { font-family: var(--font-main); font-size: 13px; padding: 4px 12px; }
  
  .msg-row { display: flex; gap: 10px; }
  .msg-avatar { width: 40px; height: 40px; background: #aaa; border: 2px solid; border-color: #fff #888 #888 #fff; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; cursor: pointer; }
  .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .msg-content { flex: 1; }
  .msg-header { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; }
  .msg-name { font-weight: bold; font-family: var(--font-main); font-size: 13px; cursor: pointer; color: #000080; }
  .msg-name:hover { text-decoration: underline; }
  .msg-role { font-size: 10px; background: #ffdd00; color: #000; padding: 1px 4px; border: 1px solid #888; }
  .msg-time { font-size: 10px; color: #888; font-family: var(--font-main); }
  .msg-text { font-family: var(--font-main); font-size: 13px; line-height: 1.4; word-break: break-word; }
  .msg-photo { max-width: 300px; max-height: 200px; border: 2px solid; border-color: #888 #fff #fff #888; margin-top: 4px; }
  
  .mod-tools { font-size: 10px; color: #cc0000; cursor: pointer; margin-left: auto; display: none; }
  .is-mod .mod-tools { display: inline; }
  
  .panel { display: none; flex: 1; flex-direction: column; height: 100%; overflow-y: auto; padding: 16px; background: #d4d0c8; }
  .panel.active { display: flex; }
  
  .shop-item { background: #fff; border: 2px solid; border-color: #fff #888 #888 #fff; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .shop-pts { font-weight: bold; color: #000080; font-family: var(--font-display); font-size: 18px; }
  
  /* Upload overlay */
  #imgPreview { display:none; max-width:100px; max-height:100px; border:1px solid #888; margin-right:8px; }
</style>
</head>
<body>

<div class="window forum-window">
  <div class="window-titlebar">
    <div class="window-title">
      <div class="window-title-icon"></div>
      <span id="pageTitle">Forum & Chat - Loading...</span>
    </div>
    <div class="window-controls">
      <div class="win-btn" onclick="window.close()">✕</div>
    </div>
  </div>
  
  <div class="forum-container">
    <div class="sidebar">
      <div style="padding:10px; text-align:center; border-bottom:2px solid #888; margin-bottom:4px">
        <div id="myPoints" style="font-family:var(--font-display); font-size:32px; color:#000080">0</div>
        <div style="font-size:11px; font-family:var(--font-main)">Your Points</div>
      </div>
    
      <div class="sidebar-category">FORUM TOPICS</div>
      <div class="sidebar-item active" onclick="switchTopic('general', this)">💬 Genel Sohbet</div>
      <div class="sidebar-item" onclick="switchTopic('hours', this)">⏱ Kaç Saat Çalıştım</div>
      <div class="sidebar-item" onclick="switchTopic('workspace', this)">💻 Çalışma Alanım</div>
      
      <div class="sidebar-category">EXTRAS</div>
      <div class="sidebar-item" onclick="switchPanel('shop', this)">🛒 Market (Shop)</div>
      <div class="sidebar-item" onclick="switchPanel('profile', this)">⚙️ Profil Ayarları</div>
    </div>
    
    <div class="main-area">
      <!-- Chat Panel -->
      <div id="panel-chat" class="panel active" style="padding:0; background:#fff">
        <div style="background:#e8e8e8; border-bottom:1px solid #aaa; padding:6px 10px; font-family:var(--font-main); font-weight:bold; font-size:13px" id="chatTitle">💬 Genel Sohbet</div>
        <div class="chat-box" id="chatBox">
          <div style="text-align:center; padding:20px; color:#888; font-family:var(--font-main)">Loading messages...</div>
        </div>
        <div class="chat-input-area">
          <button class="retro-btn" onclick="document.getElementById('chatImgInput').click()" title="Add Photo">📷</button>
          <input type="file" id="chatImgInput" accept="image/*" style="display:none" onchange="previewChatImg(this)">
          <img id="imgPreview" src="">
          <input type="text" id="chatInput" class="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
          <button class="retro-btn primary chat-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
      
      <!-- Shop Panel -->
      <div id="panel-shop" class="panel">
        <h2 style="font-family:var(--font-main); border-bottom:2px solid #aaa; padding-bottom:4px; margin-bottom:12px">🛒 Market</h2>
        <div id="shopItems">
          <div style="color:#555; font-size:12px">Loading items...</div>
        </div>
      </div>
      
      <!-- Profile Settings Panel -->
      <div id="panel-profile" class="panel">
        <h2 style="font-family:var(--font-main); border-bottom:2px solid #aaa; padding-bottom:4px; margin-bottom:12px">⚙️ Profil Ayarları</h2>
        <div class="groupbox">
          <span class="groupbox-title">Avatar & Banner</span>
          <div class="form-row">
            <label class="form-label">Avatar Resmi:</label>
            <input type="file" id="avatarInput" accept="image/*" onchange="previewProfileImg(this, 'avatarPreview')">
            <img id="avatarPreview" style="width:60px; height:60px; object-fit:cover; border:2px solid #888; margin-top:4px; display:none">
          </div>
          <div class="form-row">
            <label class="form-label">Banner Resmi:</label>
            <input type="file" id="bannerInput" accept="image/*" onchange="previewProfileImg(this, 'bannerPreview')">
            <img id="bannerPreview" style="width:100%; height:80px; object-fit:cover; border:2px solid #888; margin-top:4px; display:none">
          </div>
        </div>
        <div class="groupbox">
          <span class="groupbox-title">Hakkımda</span>
          <textarea class="retro-textarea" id="profileAbout" rows="4"></textarea>
        </div>
        <div style="text-align:right">
          <button class="retro-btn primary" onclick="saveProfile()">💾 Kaydet</button>
          <span id="profSaveMsg" style="color:green; font-size:12px; display:none; margin-right:8px">✔ Kaydedildi!</span>
        </div>
      </div>
      
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy, limit, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYkgd-zKX-AzE5bXKnUWuwSMIT__4Z7OA",
  authDomain: "dersprogram-31d2d.firebaseapp.com",
  projectId: "dersprogram-31d2d",
  storageBucket: "dersprogram-31d2d.firebasestorage.app",
  messagingSenderId: "910271309823",
  appId: "1:910271309823:web:87684f55e386e0ef5e29ca"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const streamer = new URLSearchParams(window.location.search).get('user');
let currentUser = null;
let currentTopic = 'general';
let chatUnsub = null;
let chatRoles = [];
let mods = [];
let myPoints = 0;
let shopItems = [];
let pendingPhoto = null;

// Chat roles logic
function getChatRole(msgCount) {
  if (!chatRoles.length) return { icon: '👤', name: 'Üye', color: '#fff' };
  const sorted = [...chatRoles].sort((a,b) => b.minMsgs - a.minMsgs);
  for (const r of sorted) if (msgCount >= r.minMsgs) return r;
  return { icon: '👤', name: 'Üye', color: '#fff' };
}

window.switchTopic = (topic, el) => {
  currentTopic = topic;
  document.querySelectorAll('.sidebar-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-chat').classList.add('active');
  
  const titles = { 'general': '💬 Genel Sohbet', 'hours': '⏱ Kaç Saat Çalıştım', 'workspace': '💻 Çalışma Alanım' };
  document.getElementById('chatTitle').textContent = titles[topic];
  
  loadChat();
};

window.switchPanel = (panelId, el) => {
  document.querySelectorAll('.sidebar-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + panelId).classList.add('active');
  if(panelId === 'shop') loadShopUI();
};

async function loadStreamerConfig() {
  if (!streamer) return;
  document.getElementById('pageTitle').textContent = 'Forum — ' + streamer;
  try {
    const snap = await getDoc(doc(db, 'users', streamer));
    if (snap.exists()) {
      chatRoles = snap.data().chatRoles || [];
      mods = snap.data().mods || [];
    }
  } catch(e) {}
}

async function loadMyStats() {
  if (!currentUser || !streamer) return;
  try {
    onSnapshot(doc(db, 'users', streamer, 'attendance', currentUser), snap => {
      if (snap.exists()) {
        myPoints = snap.data().points || 0;
        document.getElementById('myPoints').textContent = myPoints;
      }
    });
  } catch(e) {}
}

// ── Chat ──────────────────────────────────────────────
function loadChat() {
  if (!streamer) return;
  if (chatUnsub) chatUnsub();
  const box = document.getElementById('chatBox');
  box.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">Loading...</div>';
  
  const q = query(collection(db, 'users', streamer, 'forum', currentTopic, 'messages'), orderBy('timestamp', 'desc'), limit(50));
  chatUnsub = onSnapshot(q, snap => {
    const msgs = [];
    snap.forEach(d => msgs.push({ id: d.id, ...d.data() }));
    msgs.reverse(); // oldest first at top
    
    if (!msgs.length) {
      box.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">No messages yet. Start the conversation!</div>';
      return;
    }
    
    const isMod = currentUser === streamer || mods.includes(currentUser);
    box.parentElement.classList.toggle('is-mod', isMod);
    
    box.innerHTML = msgs.map(m => {
      const time = m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString() : '';
      const photoHtml = m.photo ? `<img src="${m.photo}" class="msg-photo">` : '';
      const roleStr = m.role ? `<span class="msg-role" style="background:${m.roleColor||'#ffdd00'}">${m.roleIcon||'👤'} ${m.roleName||'Üye'}</span>` : '';
      const avatarHtml = m.avatar ? `<img src="${m.avatar}">` : (m.sender.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase());
      
      return `
        <div class="msg-row">
          <div class="msg-avatar" onclick="window.open('profile.html?user=${m.sender}', '_blank')">${avatarHtml}</div>
          <div class="msg-content">
            <div class="msg-header">
              <span class="msg-name" onclick="window.open('profile.html?user=${m.sender}', '_blank')">${m.sender}</span>
              ${roleStr}
              <span class="msg-time">${time}</span>
              <span class="mod-tools" onclick="deleteMsg('${m.id}')">[Sil]</span>
            </div>
            <div class="msg-text">${m.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
            ${photoHtml}
          </div>
        </div>
      `;
    }).join('');
    box.scrollTop = box.scrollHeight;
  });
}

window.deleteMsg = async (id) => {
  if(!confirm('Mesaj silinsin mi?')) return;
  try {
    await deleteDoc(doc(db, 'users', streamer, 'forum', currentTopic, 'messages', id));
  } catch(e) { alert(e.message); }
};

window.previewChatImg = (input) => {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingPhoto = e.target.result;
    document.getElementById('imgPreview').src = pendingPhoto;
    document.getElementById('imgPreview').style.display = 'block';
  };
  reader.readAsDataURL(input.files[0]);
};

window.sendMessage = async () => {
  if (!currentUser || !streamer) return alert('Giriş yapmalısınız.');
  const text = document.getElementById('chatInput').value.trim();
  if (!text && !pendingPhoto) return;
  
  document.getElementById('chatInput').value = '';
  document.getElementById('imgPreview').style.display = 'none';
  const photoToSend = pendingPhoto;
  pendingPhoto = null;
  
  try {
    // get user avatar and current msg count
    const pSnap = await getDoc(doc(db, 'users', currentUser));
    let avatar = '';
    if(pSnap.exists() && pSnap.data().profile) avatar = pSnap.data().profile.avatarImg || '';
    
    const attRef = doc(db, 'users', streamer, 'attendance', currentUser);
    const attSnap = await getDoc(attRef);
    let msgCount = 0;
    let myPointsNow = 0;
    if(attSnap.exists()) {
      msgCount = (attSnap.data().messageCount || 0) + 1;
      myPointsNow = (attSnap.data().points || 0) + 1;
    } else {
      msgCount = 1; myPointsNow = 1;
    }
    
    // Update attendance doc with points and message count
    await setDoc(attRef, { messageCount: msgCount, points: myPointsNow }, { merge: true });
    
    const role = getChatRole(msgCount);
    
    await addDoc(collection(db, 'users', streamer, 'forum', currentTopic, 'messages'), {
      sender: currentUser,
      avatar: avatar,
      text: text,
      photo: photoToSend || null,
      roleIcon: role.icon,
      roleName: role.name,
      roleColor: role.color,
      timestamp: serverTimestamp()
    });
  } catch(e) {
    alert('Hata: ' + e.message);
  }
};

// ── Shop ──────────────────────────────────────────────
async function loadShopUI() {
  if (!streamer) return;
  const container = document.getElementById('shopItems');
  container.innerHTML = 'Loading...';
  try {
    const snap = await getDoc(doc(db, 'users', streamer));
    const items = [];
    items.push({ id: 'streak_rec', name: '🔥 Streak Kurtarma', cost: 50, desc: 'Streak kaybedersen 1 hakkın olur.' });
    if (snap.exists() && snap.data().shopItems) {
      snap.data().shopItems.forEach(i => items.push(i));
    }
    
    container.innerHTML = items.map(i => `
      <div class="shop-item">
        <div>
          <div style="font-weight:bold; font-family:var(--font-main); font-size:14px">${i.name}</div>
          <div style="font-size:11px; color:#555; font-family:var(--font-main)">${i.desc||''}</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px">
          <div class="shop-pts">${i.cost} Puan</div>
          <button class="retro-btn primary" onclick="buyItem('${i.id}', '${i.name}', ${i.cost})">Satın Al</button>
        </div>
      </div>
    `).join('');
  } catch(e) { container.innerHTML = 'Hata: '+e.message; }
}

window.buyItem = async (id, name, cost) => {
  if(!currentUser || !streamer) return;
  if(!confirm(`${cost} puan harcayarak "${name}" almak istediğine emin misin?`)) return;
  if(myPoints < cost) { alert('Puanın yetersiz!'); return; }
  
  try {
    const attRef = doc(db, 'users', streamer, 'attendance', currentUser);
    const attSnap = await getDoc(attRef);
    if(id === 'streak_rec') {
      const recs = (attSnap.exists() && attSnap.data().streakRecoveries !== undefined) ? attSnap.data().streakRecoveries : 1;
      await setDoc(attRef, { points: myPoints - cost, streakRecoveries: recs + 1 }, { merge: true });
    } else {
      await setDoc(attRef, { points: myPoints - cost }, { merge: true });
    }
    
    // Add to shop purchases for OBS alert
    await setDoc(doc(db, 'users', streamer, 'shopPurchases', Date.now().toString()), {
      buyer: currentUser,
      itemName: name,
      cost: cost,
      timestamp: serverTimestamp()
    });
    
    alert('Satın alma başarılı! OBS alert gönderildi.');
  } catch(e) { alert(e.message); }
};

// ── Profile Settings ──────────────────────────────────
let curProfAvatar = '', curProfBanner = '';

window.previewProfileImg = (input, targetId) => {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById(targetId).src = e.target.result;
    document.getElementById(targetId).style.display = 'block';
    if(targetId === 'avatarPreview') curProfAvatar = e.target.result;
    if(targetId === 'bannerPreview') curProfBanner = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
};

async function loadProfileSettings() {
  if (!currentUser) return;
  try {
    const snap = await getDoc(doc(db, 'users', currentUser));
    if (snap.exists() && snap.data().profile) {
      const p = snap.data().profile;
      if(p.avatarImg) { curProfAvatar = p.avatarImg; document.getElementById('avatarPreview').src = p.avatarImg; document.getElementById('avatarPreview').style.display='block'; }
      if(p.bannerImg) { curProfBanner = p.bannerImg; document.getElementById('bannerPreview').src = p.bannerImg; document.getElementById('bannerPreview').style.display='block'; }
      if(p.about) document.getElementById('profileAbout').value = p.about;
    }
  } catch(e) {}
}

window.saveProfile = async () => {
  if (!currentUser) return;
  try {
    await setDoc(doc(db, 'users', currentUser), {
      profile: {
        avatarImg: curProfAvatar,
        bannerImg: curProfBanner,
        about: document.getElementById('profileAbout').value.trim()
      }
    }, { merge: true });
    document.getElementById('profSaveMsg').style.display = 'inline';
    setTimeout(() => document.getElementById('profSaveMsg').style.display = 'none', 2000);
  } catch(e) { alert(e.message); }
};

// ── Init ──────────────────────────────────────────────
if(!streamer) {
  document.body.innerHTML = '<div style="background:#fff;padding:20px;border:2px solid;font-family:var(--font-main)">Missing ?user=USERNAME in URL</div>';
}

onAuthStateChanged(auth, async user => {
  if(user) {
    currentUser = localStorage.getItem('dp_current') || user.email.replace('@lessonschedule.app','');
    await loadStreamerConfig();
    await loadMyStats();
    await loadProfileSettings();
    loadChat();
  } else {
    document.body.innerHTML = '<div style="background:#fff;padding:20px;border:2px solid;font-family:var(--font-main)">Please log in from Attendance page first!</div>';
  }
});

</script>
</body>
</html>
